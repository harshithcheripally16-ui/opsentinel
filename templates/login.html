{% extends "layout/base.html" %}

{% block title %}Sign In — OpsSentinel{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="card auth-card">
        <h2 class="section-title">Welcome back</h2>
        <p class="subtitle">Sign in to access your monitoring dashboard.</p>

        <!-- Flash messages are handled in base.html -->

        <form class="form" method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" placeholder="e.g. admin" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <hr class="divider">
        <p class="form-footer">Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign Up</a></p>
    </div>
</div>
{% endblock %}
