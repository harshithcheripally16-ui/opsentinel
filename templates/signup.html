{% extends "layout/base.html" %}

{% block title %}Sign Up — OpsSentinel{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="card auth-card">
        <div class="auth-header">
            <div class="brand-dot"></div>
            <h2 class="section-title">Create account</h2>
            <p class="subtitle">Register to start monitoring your infrastructure.</p>
        </div>

        <!-- Flash messages are handled in base.html -->

        <form class="form" method="POST" action="{{ url_for('auth.signup') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" placeholder="Min. 3 characters" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" placeholder="Min. 3 characters" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn-primary">Sign Up</button>
        </form>

        <hr class="divider">
        <p class="form-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Sign In</a></p>
    </div>
</div>
{% endblock %}
